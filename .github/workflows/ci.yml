name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tested Python range for all BioView packages: >=3.12, <3.14.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scipy
          # The server depends on bioview-common (a separate repo). Install it
          # from the same source the installer uses (see build.toml).
          pip install "bioview-common @ git+https://github.com/bioview/bioview-common.git@main"
          pip install .

      - name: Run tests
        # The e2e tests use the always-available dummy device backend, so no
        # UHD/BIOPAC hardware or drivers are required.
        run: python -m pytest
